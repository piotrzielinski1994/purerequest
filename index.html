<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReqUI</title>
    <!-- Paint black immediately so the first frame (before the CSS bundle +
         React mount) is dark, not a white flash. -->
    <style>
      html,
      body {
        margin: 0;
        background-color: #000;
      }
    </style>
  </head>

  <body>
    <!-- The panes render transparent down to this mount node, so it owns the
         themed backdrop. The utilities resolve --background/--foreground per mode;
         they sit above the unlayered #000 flash-guard (which would otherwise win
         in light mode, since @layer base ranks below unlayered rules). -->
    <div id="root" class="bg-background text-foreground"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
